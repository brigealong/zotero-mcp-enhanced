<linkset>
  <html:link rel="localization" href="markdownreadercopy-preferences.ftl" />
</linkset>
<groupbox
  onload="window.StoredAttachmentPoC && window.StoredAttachmentPoC.hooks && window.StoredAttachmentPoC.hooks.onPrefsEvent && window.StoredAttachmentPoC.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="markdownreadercopy-pref-title"></html:h2></label>
  <checkbox
    id="zotero-prefpane-markdownreadercopy-enable"
    preference="extensions.zotero.markdownreadercopy.enable"
    data-l10n-id="markdownreadercopy-pref-enable"
  />
  <hbox>
    <html:label
      for="zotero-prefpane-markdownreadercopy-input"
      data-l10n-id="markdownreadercopy-pref-input"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-markdownreadercopy-input"
      preference="extensions.zotero.markdownreadercopy.input"
    ></html:input>
  </hbox>
  <hbox class="virtualized-table-container" flex="1" height="300px">
    <html:div id="markdownreadercopy-table-container" />
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="markdownreadercopy-pref-help"
  ></html:label>
</vbox>
